<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Skincare Shop</title>
<style>
body {
    font-family: Arial;
    background: #ffe6f0;
    margin: 0;
}
.container {
    padding: 20px;
}
.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin: 10px 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.03);
}
button {
    background: pink;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}
.product img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">

<h2>Login / Sign Up</h2>
<input placeholder="Nama"><br><br>
<input placeholder="Email"><br><br>
<input placeholder="Password" type="password"><br><br>
<button onclick="login()">Masuk</button>

<h2>Produk Skincare</h2>

<div class="card product">
<img src="https://via.placeholder.com/150">
<h3>Serum Glow</h3>
<p>Rp 120.000</p>
<button onclick="addCart('Serum Glow',120000)">Tambah</button>
</div>

<div class="card product">
<img src="https://via.placeholder.com/150">
<h3>Facial Wash</h3>
<p>Rp 80.000</p>
<button onclick="addCart('Facial Wash',80000)">Tambah</button>
</div>

<div class="card product">
<img src="https://via.placeholder.com/150">
<h3>Moisturizer</h3>
<p>Rp 100.000</p>
<button onclick="addCart('Moisturizer',100000)">Tambah</button>
</div>

<br>
<button onclick="goCart()">Ke Keranjang 🛒</button>

</div>

<script>
function login(){
    alert("Login berhasil!");
}

function addCart(nama, harga){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({nama, harga});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Ditambahkan ke keranjang");
}

function goCart(){
    window.location.href = "cart.html";
}
</script>

</body>
</html>
